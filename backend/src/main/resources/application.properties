# ── Server ─────────────────────────────────────────────────────────

server.port=${PORT:8080}
# ── MySQL Database ───────────────────────────────────────────────
# Railway provides MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, and MYSQLPASSWORD.
# For local runs, either set these environment variables or use the defaults below.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:stride_ecom}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Configuration ────────────────────────────────────────────
# IMPORTANT: Change this secret to a long random string in production!
app.jwt.secret=${JWT_SECRET:stride_ecom_super_secret_key_dsatm_bic607_2024_change_this_in_production}
app.jwt.expiration=86400000

# Comma-separated frontend URLs allowed to call this API.
# Example for Railway after Vercel deploy:
# CORS_ALLOWED_ORIGINS=https://your-frontend.vercel.app,http://localhost:3000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# ── Application ──────────────────────────────────────────────────
app.name=STRIDE E-Commerce
spring.application.name=stride-ecom

# Basic request limits for DoS protection
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.stride.ecom=DEBUG
logging.level.org.springframework.security=WARN
